<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ler Bem - Livros</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="pagina">
    <aside class="menu">
      <h1>📚 Ler Bem</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="usuarios.html">Usuários</a>
        <a href="livros.html" class="ativo">Livros</a>
        <a href="emprestimos.html">Empréstimos</a>
      </nav>
      <button onclick="sair()">Sair</button>
    </aside>
    <main class="conteudo">
      <h2>Livros</h2>
      <div class="card-form">
        <h3>Novo Livro</h3>
        <div class="grid-2">
          <div class="campo">
            <label>Título</label>
            <input type="text" id="titulo" placeholder="Título do livro">
          </div>
          <div class="campo">
            <label>Autor</label>
            <input type="text" id="autor" placeholder="Nome do autor">
          </div>
          <div class="campo">
            <label>ISBN</label>
            <input type="text" id="isbn" placeholder="000-0000000000">
          </div>
          <div class="campo">
            <label>Ano de Publicação</label>
            <input type="number" id="anoPublicacao" placeholder="2024">
          </div>
          <div class="campo">
            <label>Categoria</label>
            <input type="text" id="categoria" placeholder="Ex: Ficção, Romance...">
          </div>
        </div>
        <button onclick="cadastrarLivro()">Cadastrar</button>
      </div>
      <div class="card-tabela">
        <h3>Livros cadastrados</h3>
        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Autor</th>
              <th>ISBN</th>
              <th>Ano</th>
              <th>Categoria</th>
              <th>Disponível</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaLivros">
            <tr><td colspan="7">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="livros.js"></script>
</body>
</html>

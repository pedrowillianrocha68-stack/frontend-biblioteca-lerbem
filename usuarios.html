<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ler Bem - Usuários</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="pagina">
    <aside class="menu">
      <h1>📚 Ler Bem</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="usuarios.html" class="ativo">Usuários</a>
        <a href="livros.html">Livros</a>
        <a href="emprestimos.html">Empréstimos</a>
      </nav>
      <button onclick="sair()">Sair</button>
    </aside>
    <main class="conteudo">
      <h2>Usuários</h2>
      <div class="card-form">
        <h3>Novo Usuário</h3>
        <div class="grid-2">
          <div class="campo">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Nome completo">
          </div>
          <div class="campo">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@exemplo.com">
          </div>
          <div class="campo">
            <label>CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00">
          </div>
          <div class="campo">
            <label>Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000">
          </div>
          <div class="campo">
            <label>Endereço</label>
            <input type="text" id="endereco" placeholder="Rua, número, bairro">
          </div>
          <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Digite uma senha">
          </div>
        </div>
        <button onclick="cadastrarUsuario()">Cadastrar</button>
      </div>
      <div class="card-tabela">
        <h3>Usuários cadastrados</h3>
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>CPF</th>
              <th>Telefone</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabelaUsuarios">
            <tr><td colspan="5">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="usuarios.js"></script>
</body>
</html>
